<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ title }}</title>
    <link rel="stylesheet"
      href="https://netdna.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css"
      integrity="sha384-pdapHxIh7EYuwy6K7iE41uXVxGCXY0sAjBzaElYGJUrzwodck3Lx6IE2lA0rFREo"
      crossorigin="anonymous">
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/2.9.0/jquery.fullPage.min.css"
      integrity="sha384-7iwtIAfJcdmOE1v8ooJt9VseRUH/H1orBncarhY6Gc4DwFqdGMZmsKB3qL4W/uKW"
      crossorigin="anonymous">
    <link rel="stylesheet/less" type="text/css" href="/static/css/main.less" />
    <script type="text/javascript"
      src="https://cdnjs.cloudflare.com/ajax/libs/less.js/2.7.1/less.min.js"
      integrity="sha384-CxtfC0hc2gDgMW/e3Sdq+UI3CxRv3A/DwBYrQ2c/mmbY3GASa6G5A/AxIt+mFF77"
      crossorigin="anonymous"></script>
  </head>
  <body>
    {% block content %}
    {% endblock %}
    <script type="text/javascript"
      src="https://code.jquery.com/jquery-2.1.4.min.js"
      integrity="sha384-R4/ztc4ZlRqWjqIuvf6RX5yb/v90qNGx6fS48N0tRxiGkqveZETq72KgDVJCp2TC"
      crossorigin="anonymous"></script>
    <script type="text/javascript"
      src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/js/bootstrap.min.js"
      integrity="sha384-pPttEvTHTuUJ9L2kCoMnNqCRcaMPMVMsWVO+RLaaaYDmfSP5//dP6eKRusbPcqhZ"
      crossorigin="anonymous"></script>
    <script type="text/javascript"
      src="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/2.9.0/jquery.fullPage.min.js"
      integrity="sha384-hhNjiSNhqsiYAL+l31KyzcTGAYraOrVCwtxxKCi6Tq8Go3PMns99n1fJfcqFuGmq"
      crossorigin="anonymous"></script>
    <script type="text/javascript">
    $(document).ready(function() {
      $('#fullpage').fullpage({
        sectionsColor: ['#F3F3F3', '#FFFFFF', '#F3F3F3', '#FFFFFF', '#F3F3F3', '#FFFFFF', '#F3F3F3'],
        anchors: ['main', 'our-story', 'the-big-day', 'accomodation', 'explore', 'song-requests', 'registry']
    });

    });
    </script>
    <script>
    (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
    (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
    m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
    })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');

    ga('create', 'UA-48319445-4', 'auto');
    ga('send', 'pageview');

    function handleOutboundLinkClicks(event) {
      ga('send', 'event', {
        eventCategory: 'Link Click',
        eventAction: 'click',
        eventLabel: event.target.href
      });
    }
    // Feature detects Navigation Timing API support.
    if (window.performance) {
      // Gets the number of milliseconds since page load
      // (and rounds the result since the value must be an integer).
      var timeSincePageLoad = Math.round(performance.now());

      // Sends the timing hit to Google Analytics.
      ga('send', 'timing', 'JS Dependencies', 'load', timeSincePageLoad);
    }
  </script>
  </body>
</html>
